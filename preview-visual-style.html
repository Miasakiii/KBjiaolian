<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB教练 — 视觉风格预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; padding: 40px 20px; }
  h1 { text-align: center; font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
  .subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 14px; }
  .cards { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
  .card { width: 340px; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .card.selected { outline: 3px solid #166534; outline-offset: 2px; }
  .card-preview { height: 320px; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card-label { padding: 16px 20px; }
  .card-label h3 { font-size: 16px; margin-bottom: 6px; }
  .card-label p { font-size: 13px; color: #666; line-height: 1.5; }
  .mock-app { width: 100%; max-width: 280px; font-size: 13px; }
  .mock-header { padding: 12px 16px; font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .mock-sub { font-size: 11px; opacity: 0.6; margin-bottom: 16px; padding: 0 16px; }
  .mock-split { display: flex; gap: 8px; padding: 0 16px; }
  .mock-left, .mock-right { flex: 1; border-radius: 8px; padding: 12px; }
  .mock-left h4, .mock-right h4 { font-size: 11px; margin-bottom: 8px; font-weight: 600; }
  .mock-upload { border: 2px dashed; border-radius: 8px; padding: 20px 8px; text-align: center; margin-top: 8px; font-size: 11px; opacity: 0.7; }
  .mock-bar { height: 6px; border-radius: 3px; margin-bottom: 6px; }
  .mock-bar.short { width: 60%; }
  .mock-btn { border-radius: 6px; padding: 8px 12px; text-align: center; font-size: 11px; margin-top: 10px; font-weight: 600; cursor: pointer; }
  .note { text-align: center; margin-top: 32px; font-size: 13px; color: #999; }

  /* Style A: 极简白 */
  .style-a .card-preview { background: #f8f9fa; }
  .style-a .mock-app { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .style-a .mock-header { color: #1a1a1a; border-bottom: 1px solid #eee; }
  .style-a .mock-left, .style-a .mock-right { background: #fafafa; border: 1px solid #eee; }
  .style-a .mock-left h4, .style-a .mock-right h4 { color: #555; }
  .style-a .mock-upload { border-color: #ccc; color: #888; }
  .style-a .mock-bar { background: #e5e5e5; }
  .style-a .mock-bar.fill { background: #1a1a1a; }
  .style-a .mock-btn { background: #1a1a1a; color: #fff; }

  /* Style B: 深色科技 */
  .style-b .card-preview { background: linear-gradient(135deg, #0f172a, #1e293b); }
  .style-b .mock-app { background: rgba(255,255,255,0.05); border-radius: 8px; overflow: hidden; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
  .style-b .mock-header { color: #f1f5f9; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .style-b .mock-sub { color: rgba(255,255,255,0.4); }
  .style-b .mock-left, .style-b .mock-right { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
  .style-b .mock-left h4, .style-b .mock-right h4 { color: rgba(255,255,255,0.6); }
  .style-b .mock-upload { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); }
  .style-b .mock-bar { background: rgba(255,255,255,0.08); }
  .style-b .mock-bar.fill { background: linear-gradient(90deg, #38bdf8, #818cf8); }
  .style-b .mock-btn { background: linear-gradient(135deg, #38bdf8, #818cf8); color: #fff; }
  .style-b .card-label p { color: #888; }

  /* Style C: 活力健康 */
  .style-c .card-preview { background: #f0fdf4; }
  .style-c .mock-app { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid #bbf7d0; }
  .style-c .mock-header { color: #166534; border-bottom: 1px solid #dcfce7; }
  .style-c .mock-sub { color: #16a34a; }
  .style-c .mock-left, .style-c .mock-right { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .style-c .mock-left h4, .style-c .mock-right h4 { color: #166534; }
  .style-c .mock-upload { border-color: #86efac; color: #16a34a; }
  .style-c .mock-bar { background: #dcfce7; }
  .style-c .mock-bar.fill { background: #16a34a; }
  .style-c .mock-btn { background: #16a34a; color: #fff; }
</style>
</head>
<body>

<h1>选择视觉风格</h1>
<p class="subtitle">点击卡片选择，3 个方案都是左右分栏布局</p>

<div class="cards">

  <!-- Style A: 极简白 -->
  <div class="card style-a" onclick="selectCard(this)">
    <div class="card-preview">
      <div class="mock-app">
        <div class="mock-header">KB教练</div>
        <div class="mock-sub">AI 体态分析</div>
        <div class="mock-split">
          <div class="mock-left">
            <h4>拍照 / 上传</h4>
            <div class="mock-upload">📷 点击上传</div>
          </div>
          <div class="mock-right">
            <h4>分析结果</h4>
            <div class="mock-bar fill" style="width:80%"></div>
            <div class="mock-bar" style="width:60%"></div>
            <div class="mock-bar short" style="width:40%"></div>
            <div class="mock-btn">查看详情</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-label">
      <h3>A. 极简白</h3>
      <p>白底 + 浅灰边框 + 大量留白，干净专业。适合工具类应用，突出数据本身。</p>
    </div>
  </div>

  <!-- Style B: 深色科技 -->
  <div class="card style-b" onclick="selectCard(this)">
    <div class="card-preview">
      <div class="mock-app">
        <div class="mock-header">KB教练</div>
        <div class="mock-sub">AI 体态分析</div>
        <div class="mock-split">
          <div class="mock-left">
            <h4>拍照 / 上传</h4>
            <div class="mock-upload">📷 点击上传</div>
          </div>
          <div class="mock-right">
            <h4>分析结果</h4>
            <div class="mock-bar fill" style="width:80%"></div>
            <div class="mock-bar" style="width:60%"></div>
            <div class="mock-bar short" style="width:40%"></div>
            <div class="mock-btn">查看详情</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-label">
      <h3>B. 深色科技</h3>
      <p>深蓝背景 + 玻璃质感，科技感强。适合 AI 产品，有未来感。</p>
    </div>
  </div>

  <!-- Style C: 活力健康 -->
  <div class="card style-c" onclick="selectCard(this)">
    <div class="card-preview">
      <div class="mock-app">
        <div class="mock-header">KB教练</div>
        <div class="mock-sub">AI 体态分析</div>
        <div class="mock-split">
          <div class="mock-left">
            <h4>拍照 / 上传</h4>
            <div class="mock-upload">📷 点击上传</div>
          </div>
          <div class="mock-right">
            <h4>分析结果</h4>
            <div class="mock-bar fill" style="width:80%"></div>
            <div class="mock-bar" style="width:60%"></div>
            <div class="mock-bar short" style="width:40%"></div>
            <div class="mock-btn">查看详情</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-label">
      <h3>C. 活力健康</h3>
      <p>绿色系 + 白底，清新自然。直接关联健身/健康主题，用户直觉匹配度高。</p>
    </div>
  </div>

</div>

<p class="note" id="result"></p>

<script>
function selectCard(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const style = el.querySelector('h3').textContent;
  document.getElementById('result').textContent = '已选择：' + style + ' — 在终端告诉我确认';
}
</script>

</body>
</html>
