# ============================================
# KB教练 - 阿里云服务器 Nginx 配置
# 放置路径: /etc/nginx/conf.d/kb-wctgrzpj.cn.conf
# ============================================
#
# 架构说明:
#   前端 (kb.wctgrzpj.cn)     -> Nginx:80  -> localhost:3000 (Next.js)
#   后端 (服务器IP:3003)       -> 直接访问   -> localhost:3003 (Express)
#
# 后端通过 IP:3003 直接对外提供服务，无需 Nginx 反向代理

# Next.js 前端
upstream kb_frontend {
    server 127.0.0.1:3000;
}

# HTTP 服务器
server {
    listen 80;
    server_name kb.wctgrzpj.cn;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml
               font/woff2;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 前端路由 - 所有请求代理到 Next.js
    location / {
        proxy_pass http://kb_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js 静态资源缓存
    location /_next/static {
        proxy_pass http://kb_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 图片资源缓存
    location /images {
        proxy_pass http://kb_frontend;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

