<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KB教练 - 离线模式</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f0fdf4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 48px;
      box-shadow: 0 10px 30px rgba(22, 163, 74, 0.3);
    }
    h1 {
      color: #166534;
      font-size: 28px;
      margin-bottom: 12px;
    }
    p {
      color: #4ade80;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .features {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      text-align: left;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0fdf4;
    }
    .feature:last-child {
      border-bottom: none;
    }
    .feature-icon {
      font-size: 24px;
      width: 40px;
      text-align: center;
    }
    .feature-text {
      color: #166534;
      font-size: 14px;
    }
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3);
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(22, 163, 74, 0.4);
    }
    .status {
      margin-top: 24px;
      padding: 12px;
      background: #fef9c3;
      border-radius: 8px;
      color: #854d0e;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💪</div>
    <h1>KB教练</h1>
    <p>当前处于离线模式<br>部分功能需要网络连接</p>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">📸</span>
        <span class="feature-text">体态分析需要网络</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🏋️</span>
        <span class="feature-text">训练方案已缓存</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🍎</span>
        <span class="feature-text">饮食识别需要网络</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🤖</span>
        <span class="feature-text">AI 对话需要网络</span>
      </div>
    </div>

    <button class="button" onclick="window.location.reload()">
      重新连接
    </button>

    <div class="status">
      <strong>提示：</strong>检查网络连接后重试
    </div>
  </div>
</body>
</html>
