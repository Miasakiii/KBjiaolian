name: kb_coach
description: KB教练 - AI 驱动的健身康复应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI 组件
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # 网络请求
  http: ^1.1.0

  # 图片处理
  image_picker: ^1.0.4
  image: ^4.1.3

  # 本地存储
  shared_preferences: ^2.2.2

  # 状态管理
  provider: ^6.1.1

  # 路由
  go_router: ^12.1.3

  # 工具
  intl: ^0.19.0
  uuid: ^4.2.1
  path_provider: ^2.1.1
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/logo/
