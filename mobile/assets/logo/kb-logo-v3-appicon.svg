<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- KB教练 App Icon V3 — Squircle 徽章式 -->
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d5a54"/>
    </linearGradient>
  </defs>

  <!-- Squircle 外框 -->
  <path d="M256 0 C392 0 512 0 512 0 C512 0 512 120 512 256 C512 392 512 512 512 512 C512 512 392 512 256 512 C120 512 0 512 0 512 C0 512 0 392 0 256 C0 120 0 0 0 0 C0 0 120 0 256 0 Z"
        fill="url(#iconGrad)"/>
  <rect x="4" y="4" width="504" height="504" rx="96" fill="url(#iconGrad)"/>

  <!-- 哑铃图标（居上） -->
  <g transform="translate(256, 190)" stroke="white" stroke-width="10" stroke-linecap="round" fill="none">
    <!-- 杠 -->
    <line x1="-52" y1="0" x2="52" y2="0"/>
    <!-- 左侧配重 -->
    <rect x="-60" y="-24" width="12" height="48" rx="4" fill="white" stroke="none"/>
    <rect x="-48" y="-18" width="10" height="36" rx="3" fill="white" stroke="none"/>
    <!-- 右侧配重 -->
    <rect x="48" y="-24" width="12" height="48" rx="4" fill="white" stroke="none"/>
    <rect x="38" y="-18" width="10" height="36" rx="3" fill="white" stroke="none"/>
  </g>

  <!-- KB 文字（居下） -->
  <text x="256" y="340" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', Arial, sans-serif"
        font-size="80" font-weight="600" fill="white" letter-spacing="4">KB</text>

  <!-- 底部 tagline -->
  <text x="256" y="388" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', Arial, sans-serif"
        font-size="24" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="6">COACH</text>
</svg>
